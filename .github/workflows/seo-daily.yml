# Daily SEO optimization cycle.
# Runs every day at 01:00 UTC (~09:00 CST).
#
# Required repo secrets:
#   GCP_OAUTH_CLIENT_JSON   GCP OAuth client credentials
#   GSC_REFRESH_TOKEN_JSON  GSC refresh token for this site
#   DEEPSEEK_API_KEY        DeepSeek API key
#   TOOLKIT_CLONE_PAT       PAT with read access to Catherine123Zhang/factory-dashboard-toolkit

name: seo-daily

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: seo-daily
  cancel-in-progress: false

jobs:
  seo-cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Clone factory-dashboard-toolkit
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ secrets.TOOLKIT_CLONE_PAT }}@github.com/Catherine123Zhang/factory-dashboard-toolkit.git \
            /tmp/toolkit

      - name: Install toolkit deps
        working-directory: /tmp/toolkit
        run: uv sync

      - name: Reconstruct GCP OAuth client file
        env:
          GCP_OAUTH_CLIENT_JSON: ${{ secrets.GCP_OAUTH_CLIENT_JSON }}
        run: |
          mkdir -p "$HOME/notebookObsidian/密码"
          printf '%s' "$GCP_OAUTH_CLIENT_JSON" > "$HOME/notebookObsidian/密码/gcp-oauth.json"
          chmod 600 "$HOME/notebookObsidian/密码/gcp-oauth.json"

      - name: Reconstruct GSC refresh token
        env:
          GSC_REFRESH_TOKEN_JSON: ${{ secrets.GSC_REFRESH_TOKEN_JSON }}
        run: |
          mkdir -p "$HOME/.cache/factory-toolkit/tokens"
          printf '%s' "$GSC_REFRESH_TOKEN_JSON" > "$HOME/.cache/factory-toolkit/tokens/gsc-yinrui.json"
          chmod 600 "$HOME/.cache/factory-toolkit/tokens/gsc-yinrui.json"

      - name: Configure git identity
        run: |
          git config user.email "zhangyuanbo123@gmail.com"
          git config user.name "Zhang Yuanbo"

      - name: Refresh GSC data
        working-directory: /tmp/toolkit
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run factory-toolkit gsc --client yinrui

      - name: Run SEO cycle
        working-directory: /tmp/toolkit
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          uv run factory-toolkit seo-cycle \
            --client yinrui \
            --site-repo "$GITHUB_WORKSPACE" \
            --max-changes 1
